<script>

function saveForm() { const data = collectData(); localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); updateProgress(); }

function loadForm() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return;
  try {
    const data = JSON.parse(raw);
    setVal('name',data.name); setVal('phone',data.phone); setVal('wechat',data.wechat);
    setVal('totalScore',data.totalScore); setVal('rank',data.rank);
    setVal('scoreChinese',data.scoreChinese); setVal('scoreMath',data.scoreMath); setVal('scoreEnglish',data.scoreEnglish);
    setVal('scoreSub1',data.scoreSub1); setVal('scoreSub2',data.scoreSub2); setVal('scoreSub3',data.scoreSub3);

    setRadio('gender',data.gender); setRadio('category',data.category); setRadio('hukou',data.hukou);
    setRadio('schoolLevel',data.schoolLevel); setRadio('region',data.region); setRadio('tuition',data.tuition);
    setRadio('freeEdu',data.freeEdu); setRadio('income',data.income); setRadio('familyEdu',data.familyEdu);
    setRadio('gradSchool',data.gradSchool); setRadio('personality',data.personality);
    if(data.subjects) setCheckboxes('subjectGroup',data.subjects);
    if(data.majors) setCheckboxes('majorGroup',data.majors);
    if(data.guanxi) setCheckboxes('guanxiGroup',data.guanxi);
    if(data.health) setCheckboxes('healthGroup',data.health);
  } catch(e) { console.log(e); }
  updateProgress(); updateSubjectCount();
}
function setVal(id,v) { const e=document.getElementById(id); if(e&&v) e.value=v; }
function setRadio(n,v) { if(!v)return; const e=document.querySelector(`input[name="${n}"][value="${v}"]`); if(e)e.checked=true; }
function setCheckboxes(g,v) { if(!v||!v.length)return; const c=document.getElementById(g); if(!c)return; c.querySelectorAll('input[type="checkbox"]').forEach(cb=>{cb.checked=v.includes(cb.value);}); }
function getCheckedValues(g) { const c=document.getElementById(g); return c?Array.from(c.querySelectorAll('input:checked')).map(cb=>cb.value):[]; }
function getRadioValue(n) { const e=document.querySelector(`input[name="${n}"]:checked`); return e?e.value:''; }

function collectData() {
  return {
    name: document.getElementById('name').value.trim(), gender: getRadioValue('gender'), category: getRadioValue('category'),

    schoolLevel: getRadioValue('schoolLevel'), region: getRadioValue('region'), prefCities: document.getElementById('prefCities').value.trim(),

    guanxi: getCheckedValues('guanxiGroup'), familyEdu: getRadioValue('familyEdu'), gradSchool: getRadioValue('gradSchool'),
    health: getCheckedValues('healthGroup'), personality: getRadioValue('personality'),
    parentExpect: document.getElementById('parentExpect').value.trim(), notes: document.getElementById('notes').value.trim(),
    timestamp: new Date().toISOString()
  };
}

    '銆愬叾浠栥€?,l2('韬綋闄愬埗',data.health),l('鎬ф牸鑷瘎',data.personality),l('瀹堕暱鏈熸湜',data.parentExpect),l('鑰冪敓澶囨敞',data.notes),'',`濉啓鏃堕棿锛?{new Date(data.timestamp).toLocaleString('zh-CN')}`,'鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€','灏嗘鏁版嵁鍙戠粰浣犵殑楂樻姤甯堝嵆鍙紑濮嬪垎鏋?馃幆'
  ].filter(Boolean).join('\n');
}

async function copyToClipboard() {
  const t=document.getElementById('resultData').textContent; if(!t){showToast('璇峰厛瀵煎嚭鏁版嵁');return;}
  try{await navigator.clipboard.writeText(t);}catch(e){const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);}
  document.getElementById('copyOk').classList.add('show'); showToast('鉁?宸插鍒讹紒');
}

function updateProgress() {
  const data=collectData(); let filled=0;
  if(data.name)filled++;if(data.gender)filled++;if(data.category)filled++;if(data.hukou)filled++;
  if(data.totalScore)filled++;if(data.rank)filled++;if(data.subjects&&data.subjects.length>=3)filled++;
  if(data.majors&&data.majors.length>0)filled++;if(data.gradSchool)filled++;
  ['phone','wechat','income','guanxi','tuition','schoolLevel','region','freeEdu','prefCities','parentExpect','notes','health','personality','familyEdu','scoreChinese','scoreMath','scoreEnglish'].forEach(f=>{
    const v=data[f]; if(v&&(typeof v==='string'?v.trim():(Array.isArray(v)?v.length>0:true)))filled++;
  });
  document.getElementById('progressText').textContent=`宸插～ ${filled} / 19 椤筦;
  const bar=document.getElementById('progressBar'); bar.innerHTML='';
  for(let i=0;i<19;i++){const d=document.createElement('div');d.className='dot';if(i<filled)d.className+=' done';if(i===filled)d.className+=' active';bar.appendChild(d);}
}

function isValidCode(code) {
  return STUDENT_CODES.has(code.trim().toLowerCase());
}
function checkPassword() {
  const input = document.getElementById('passInput');
  const err = document.getElementById('passErrMsg');
  if (isValidCode(input.value)) {
    document.getElementById('lockOverlay').classList.add('hidden');
    sessionStorage.setItem('gaokao_authed', input.value.trim());
    saveForm();
  } else {
    input.classList.add('error');
    err.classList.add('show');
    setTimeout(() => { input.classList.remove('error'); }, 300);
    input.value = '';
    input.focus();
  }
}

// URL浼犲弬 ?code=sd0001 鐩存帴杩涘叆
function checkUrlCode() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  if (code && isValidCode(code)) {
    document.getElementById('lockOverlay').classList.add('hidden');
    sessionStorage.setItem('gaokao_authed', code.trim());
    saveForm();
  }
}

document.addEventListener('DOMContentLoaded', function() {
  checkUrlCode();
  if (sessionStorage.getItem('gaokao_authed')) {
    document.getElementById('lockOverlay').classList.add('hidden');
  }
  document.getElementById('passInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') checkPassword();
  });
  document.getElementById('passInput').focus();
});

window.onload=function(){loadForm();updateSubjectCount();};
</script>
