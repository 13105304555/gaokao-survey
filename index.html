<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>山东高考志愿填报</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#f0f2f5;color:#333;line-height:1.6;padding-bottom:80px}
.header{background:linear-gradient(135deg,#1a3a5c 0%,#2d6a9f 100%);color:#fff;padding:30px 20px 24px;text-align:center;position:relative;overflow:hidden}
.header::after{content:'';position:absolute;bottom:-30px;left:0;right:0;height:60px;background:#f0f2f5;border-radius:50% 50% 0 0}
.header h1{font-size:24px;font-weight:700;margin-bottom:4px;letter-spacing:2px}
.header .sub{font-size:13px;opacity:.85}
.header .badge{display:inline-block;background:rgba(255,255,255,.2);padding:2px 12px;border-radius:12px;font-size:11px;margin-top:8px}
.container{max-width:640px;margin:0 auto;padding:0 16px}
.section{background:#fff;border-radius:12px;margin:16px 0;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.section-title{font-size:16px;font-weight:700;color:#1a3a5c;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid #e8eef4;display:flex;align-items:center;gap:8px}
.section-title .num{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;background:#2d6a9f;color:#fff;border-radius:50%;font-size:12px;font-weight:700}
.field-group{margin-bottom:18px}
.field-group:last-child{margin-bottom:0}
.field-group label{display:block;font-size:14px;font-weight:600;color:#444;margin-bottom:4px}
.field-group .hint{font-size:12px;color:#999;margin-bottom:6px}
.field-group .required::after{content:' *';color:#e74c3c;font-weight:700}
input[type="text"],input[type="tel"],input[type="number"],textarea{width:100%;padding:10px 12px;border:1.5px solid #d9d9d9;border-radius:8px;font-size:15px;background:#fafafa;transition:border .2s;font-family:inherit}
input:focus,textarea:focus{outline:none;border-color:#2d6a9f;box-shadow:0 0 0 3px rgba(45,106,159,.12);background:#fff}
textarea{min-height:60px;resize:vertical}
.radio-group,.checkbox-group{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.radio-group label,.checkbox-group label{display:flex;align-items:center;gap:4px;padding:6px 14px;border:1.5px solid #d9d9d9;border-radius:20px;font-size:13px;font-weight:400;cursor:pointer;transition:all .2s;user-select:none}
.radio-group input,.checkbox-group input{display:none}
.radio-group input:checked+span,.checkbox-group input:checked+span{color:#2d6a9f;font-weight:600}
.radio-group label:has(input:checked),.checkbox-group label:has(input:checked){border-color:#2d6a9f;background:#eef4fa}
.inline-group{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.inline-group-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.btn-row{display:flex;gap:12px;margin-top:24px;flex-wrap:wrap}
.btn{flex:1;padding:14px 20px;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s;min-width:120px;text-align:center}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,#2d6a9f,#1a3a5c);color:#fff}
.btn-secondary{background:#e8eef4;color:#1a3a5c}
.btn-success{background:linear-gradient(135deg,#27ae60,#1e8449);color:#fff}
.result-panel{display:none;background:#fff;border-radius:12px;padding:20px;margin:16px 0;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.result-panel.show{display:block}
.result-panel pre{background:#f5f7fa;padding:14px;border-radius:8px;font-size:13px;line-height:1.5;overflow-x:auto;white-space:pre-wrap;word-break:break-all;max-height:400px;overflow-y:auto}
.copy-ok{display:none;color:#27ae60;font-size:13px;margin-top:6px}
.copy-ok.show{display:block}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(0,0,0,.78);color:#fff;padding:10px 24px;border-radius:24px;font-size:14px;opacity:0;transition:all .3s;pointer-events:none;z-index:100}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:420px){.inline-group{grid-template-columns:1fr}.inline-group-3{grid-template-columns:1fr 1fr}.header h1{font-size:20px}.btn{font-size:14px;padding:12px 16px}}
.footer-note{text-align:center;color:#aaa;font-size:12px;margin-top:20px;padding:0 16px}
</style>
</head>
<body>

<div class="header">
  <h1>🎓 山东高考志愿填报</h1>
  <div class="sub">数据采集表</div>
  <div class="badge">🛡 数据仅本地保存，隐私安全</div>
</div>

<div class="container">
  <div class="section">
    <div class="section-title"><span class="num">1</span> 基本信息</div>
    <div class="field-group"><label class="required">姓名</label><input type="text" id="name" placeholder="请输入真实姓名" oninput="saveForm()"></div>
    <div class="inline-group">
      <div class="field-group">
        <label class="required">性别</label>
        <div class="radio-group">
          <label><input type="radio" name="gender" value="男" onchange="saveForm()"><span>男</span></label>
          <label><input type="radio" name="gender" value="女" onchange="saveForm()"><span>女</span></label>
        </div>
      </div>
      <div class="field-group">
        <label class="required">考生类别</label>
        <div class="radio-group">
          <label><input type="radio" name="category" value="应届" onchange="saveForm()"><span>应届</span></label>
          <label><input type="radio" name="category" value="复读" onchange="saveForm()"><span>复读</span></label>
        </div>
      </div>
    </div>
    <div class="inline-group">
      <div class="field-group"><label>联系电话</label><input type="tel" id="phone" placeholder="手机号" oninput="saveForm()"></div>
      <div class="field-group"><label>微信</label><input type="text" id="wechat" placeholder="微信号" oninput="saveForm()"></div>
    </div>
    <div class="field-group">
      <label class="required">户口性质</label>
      <div class="radio-group">
        <label><input type="radio" name="hukou" value="城镇" onchange="saveForm()"><span>城镇</span></label>
        <label><input type="radio" name="hukou" value="农村" onchange="saveForm()"><span>农村</span></label>
      </div>
      <div class="hint">农村户口涉及地方专项/农村专项计划</div>
    </div>
  </div>

  <div class="section">
    <div class="section-title"><span class="num">2</span> 高考成绩</div>
    <div class="inline-group">
      <div class="field-group"><label class="required">高考总分</label><input type="number" id="totalScore" placeholder="裸分，不含加分" min="0" max="750" oninput="saveForm()"></div>
      <div class="field-group"><label class="required">全省位次</label><input type="number" id="rank" placeholder="一分一段表查询" min="1" oninput="saveForm()"><div class="hint">比分数重要！去省招考院查一分一段表</div></div>
    </div>
    <div class="field-group">
      <label class="required">选科组合</label>
      <div class="checkbox-group" id="subjectGroup">
        <label><input type="checkbox" value="物理" onchange="saveForm()"><span>物理</span></label>
        <label><input type="checkbox" value="化学" onchange="saveForm()"><span>化学</span></label>
        <label><input type="checkbox" value="生物" onchange="saveForm()"><span>生物</span></label>
        <label><input type="checkbox" value="历史" onchange="saveForm()"><span>历史</span></label>
        <label><input type="checkbox" value="地理" onchange="saveForm()"><span>地理</span></label>
        <label><input type="checkbox" value="政治" onchange="saveForm()"><span>政治</span></label>
      </div>
      <div class="hint">请选3科（已选 <span id="subjectCount">0</span>/3）</div>
    </div>
    <div class="inline-group-3">
      <div class="field-group"><label>语文</label><input type="number" id="scoreChinese" placeholder="成绩" min="0" max="150" oninput="saveForm()"></div>
      <div class="field-group"><label>数学</label><input type="number" id="scoreMath" placeholder="成绩" min="0" max="150" oninput="saveForm()"></div>
      <div class="field-group"><label>英语</label><input type="number" id="scoreEnglish" placeholder="成绩" min="0" max="150" oninput="saveForm()"></div>
    </div>
    <div class="inline-group-3">
      <div class="field-group"><label>选科1</label><input type="number" id="scoreSub1" placeholder="成绩" min="0" max="100" oninput="saveForm()"></div>
      <div class="field-group"><label>选科2</label><input type="number" id="scoreSub2" placeholder="成绩" min="0" max="100" oninput="saveForm()"></div>
      <div class="field-group"><label>选科3</label><input type="number" id="scoreSub3" placeholder="成绩" min="0" max="100" oninput="saveForm()"></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title"><span class="num">3</span> 意向偏好</div>
    <div class="field-group">
      <label>意向专业方向（可多选）</label>
      <div class="checkbox-group" id="majorGroup">
        <label><input type="checkbox" value="计算机类" onchange="saveForm()"><span>💻 计算机类</span></label>
        <label><input type="checkbox" value="电子信息类" onchange="saveForm()"><span>📡 电子信息类</span></label>
        <label><input type="checkbox" value="电气工程" onchange="saveForm()"><span>⚡ 电气工程</span></label>
        <label><input type="checkbox" value="临床医学" onchange="saveForm()"><span>🏥 临床医学</span></label>
        <label><input type="checkbox" value="口腔医学" onchange="saveForm()"><span>🦷 口腔医学</span></label>
        <label><input type="checkbox" value="法学" onchange="saveForm()"><span>⚖️ 法学</span></label>
        <label><input type="checkbox" value="师范类" onchange="saveForm()"><span>📚 师范类</span></label>
        <label><input type="checkbox" value="金融经济类" onchange="saveForm()"><span>💰 金融经济类</span></label>
        <label><input type="checkbox" value="建筑土木类" onchange="saveForm()"><span>🏗️ 建筑土木类</span></label>
        <label><input type="checkbox" value="自动化机械类" onchange="saveForm()"><span>🔧 自动化机械类</span></label>
        <label><input type="checkbox" value="基础学科" onchange="saveForm()"><span>🔬 基础学科</span></label>
        <label><input type="checkbox" value="医学技术类" onchange="saveForm()"><span>🩺 医学技术类</span></label>
        <label><input type="checkbox" value="管理类" onchange="saveForm()"><span>📊 管理类</span></label>
        <label><input type="checkbox" value="农林地矿类" onchange="saveForm()"><span>🌾 农林地矿类</span></label>
        <label><input type="checkbox" value="其他" onchange="saveForm()"><span>其他</span></label>
      </div>
    </div>
    <div class="field-group">
      <label>院校层次偏好</label>
      <div class="radio-group">
        <label><input type="radio" name="schoolLevel" value="985" onchange="saveForm()"><span>只去985</span></label>
        <label><input type="radio" name="schoolLevel" value="211以上" onchange="saveForm()"><span>211及以上</span></label>
        <label><input type="radio" name="schoolLevel" value="双一流" onchange="saveForm()"><span>双一流</span></label>
        <label><input type="radio" name="schoolLevel" value="一本以上" onchange="saveForm()"><span>一本及以上</span></label>
        <label><input type="radio" name="schoolLevel" value="有学上就行" onchange="saveForm()"><span>有学上就行</span></label>
        <label><input type="radio" name="schoolLevel" value="无所谓" onchange="saveForm()"><span>无所谓</span></label>
      </div>
    </div>
    <div class="field-group">
      <label>地域偏好</label>
      <div class="radio-group">
        <label><input type="radio" name="region" value="省内" onchange="saveForm()"><span>留在山东</span></label>
        <label><input type="radio" name="region" value="省外" onchange="saveForm()"><span>去省外</span></label>
        <label><input type="radio" name="region" value="不限" onchange="saveForm()"><span>不限</span></label>
      </div>
    </div>
    <div class="field-group"><label>想去的城市</label><input type="text" id="prefCities" placeholder="济南、青岛、北京、上海..." oninput="saveForm()"></div>
    <div class="field-group">
      <label>学费承受能力</label>
      <div class="radio-group">
        <label><input type="radio" name="tuition" value="无所谓" onchange="saveForm()"><span>无所谓</span></label>
        <label><input type="radio" name="tuition" value="1万以内" onchange="saveForm()"><span>1万以内</span></label>
        <label><input type="radio" name="tuition" value="1-3万" onchange="saveForm()"><span>1-3万</span></label>
        <label><input type="radio" name="tuition" value="3-6万" onchange="saveForm()"><span>3-6万</span></label>
        <label><input type="radio" name="tuition" value="6万以上" onchange="saveForm()"><span>6万以上</span></label>
      </div>
    </div>
    <div class="field-group">
      <label>是否接受公费/定向项目</label>
      <div class="radio-group">
        <label><input type="radio" name="freeEdu" value="愿意" onchange="saveForm()"><span>愿意，省学费</span></label>
        <label><input type="radio" name="freeEdu" value="不愿意" onchange="saveForm()"><span>不愿意，走统招</span></label>
        <label><input type="radio" name="freeEdu" value="看情况" onchange="saveForm()"><span>看情况</span></label>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title"><span class="num">4</span> 家庭背景</div>
    <div class="field-group">
      <label>家庭年收入</label>
      <div class="radio-group">
        <label><input type="radio" name="income" value="5万以下" onchange="saveForm()"><span>5万以下</span></label>
        <label><input type="radio" name="income" value="5-15万" onchange="saveForm()"><span>5-15万</span></label>
        <label><input type="radio" name="income" value="15-30万" onchange="saveForm()"><span>15-30万</span></label>
        <label><input type="radio" name="income" value="30-100万" onchange="saveForm()"><span>30-100万</span></label>
        <label><input type="radio" name="income" value="100万以上" onchange="saveForm()"><span>100万以上</span></label>
      </div>
    </div>
    <div class="field-group">
      <label>家庭行业人脉（多选）</label>
      <div class="checkbox-group" id="guanxiGroup">
        <label><input type="checkbox" value="医疗圈" onchange="saveForm()"><span>🏥 医疗圈</span></label>
        <label><input type="checkbox" value="电网能源" onchange="saveForm()"><span>⚡ 电网能源</span></label>
        <label><input type="checkbox" value="教育系统" onchange="saveForm()"><span>📚 教育系统</span></label>
        <label><input type="checkbox" value="体制内" onchange="saveForm()"><span>🏛️ 体制内</span></label>
        <label><input type="checkbox" value="金融圈" onchange="saveForm()"><span>💰 金融圈</span></label>
        <label><input type="checkbox" value="IT互联网" onchange="saveForm()"><span>💻 IT互联网</span></label>
        <label><input type="checkbox" value="法律圈" onchange="saveForm()"><span>⚖️ 法律圈</span></label>
        <label><input type="checkbox" value="经商办企业" onchange="saveForm()"><span>🏭 经商办企业</span></label>
        <label><input type="checkbox" value="军工国企" onchange="saveForm()"><span>🏗️ 军工国企</span></label>
        <label><input type="checkbox" value="无特殊人脉" onchange="saveForm()"><span>❌ 无特殊人脉</span></label>
      </div>
    </div>
    <div class="field-group">
      <label>家族教育资源</label>
      <div class="radio-group">
        <label><input type="radio" name="familyEdu" value="有，能指导" onchange="saveForm()"><span>有，能指导</span></label>
        <label><input type="radio" name="familyEdu" value="有，帮不上忙" onchange="saveForm()"><span>有，帮不上忙</span></label>
        <label><input type="radio" name="familyEdu" value="无" onchange="saveForm()"><span>无</span></label>
      </div>
    </div>
    <div class="field-group">
      <label class="required">考研意向</label>
      <div class="radio-group">
        <label><input type="radio" name="gradSchool" value="一定要考研" onchange="saveForm()"><span>🎯 一定要考研</span></label>
        <label><input type="radio" name="gradSchool" value="看情况" onchange="saveForm()"><span>🤔 看情况</span></label>
        <label><input type="radio" name="gradSchool" value="直接工作" onchange="saveForm()"><span>💼 直接工作</span></label>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title"><span class="num">5</span> 其他</div>
    <div class="field-group">
      <label>身体条件限制</label>
      <div class="checkbox-group" id="healthGroup">
        <label><input type="checkbox" value="色盲" onchange="saveForm()"><span>色盲</span></label>
        <label><input type="checkbox" value="色弱" onchange="saveForm()"><span>色弱</span></label>
        <label><input type="checkbox" value="近视800度以上" onchange="saveForm()"><span>近视800度以上</span></label>
        <label><input type="checkbox" value="高度近视不宜就读" onchange="saveForm()"><span>高度近视不宜就读</span></label>
        <label><input type="checkbox" value="听力障碍" onchange="saveForm()"><span>听力障碍</span></label>
        <label><input type="checkbox" value="身高不达标" onchange="saveForm()"><span>身高不达标</span></label>
        <label><input type="checkbox" value="无限制" onchange="saveForm()"><span>✅ 无限制</span></label>
      </div>
    </div>
    <div class="field-group">
      <label>性格自评</label>
      <div class="radio-group">
        <label><input type="radio" name="personality" value="偏技术钻研" onchange="saveForm()"><span>🔧 偏技术钻研</span></label>
        <label><input type="radio" name="personality" value="偏人际管理" onchange="saveForm()"><span>🤝 偏人际管理</span></label>
        <label><input type="radio" name="personality" value="全能型" onchange="saveForm()"><span>🌟 全能型</span></label>
        <label><input type="radio" name="personality" value="不清楚" onchange="saveForm()"><span>❓ 不清楚</span></label>
      </div>
    </div>
    <div class="field-group"><label>家长期望</label><textarea id="parentExpect" placeholder="家长有什么想法？" oninput="saveForm()"></textarea></div>
    <div class="field-group"><label>考生备注</label><textarea id="notes" placeholder="还有什么想说的？" oninput="saveForm()"></textarea></div>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" onclick="exportData()">📤 导出数据</button>
    <button class="btn btn-secondary" onclick="resetForm()">🔄 重置</button>
  </div>
  <div class="btn-row" style="margin-top:8px;">
    <button class="btn btn-success" onclick="copyToClipboard()">📋 复制数据</button>
    <button class="btn btn-secondary" onclick="previewData()">👁️ 预览</button>
  </div>

  <div class="result-panel" id="resultPanel">
    <div class="section-title">📋 导出数据</div>
    <pre id="resultData"></pre>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="copyToClipboard()">📋 复制</button>
      <button class="btn btn-secondary" onclick="document.getElementById('resultPanel').classList.remove('show')">关闭</button>
    </div>
    <div class="copy-ok" id="copyOk">✅ 已复制到剪贴板，发给高报师即可</div>
  </div>

  <div class="footer-note">数据仅保存在你手机本地，不会上传任何服务器。填完导出发给高报师。</div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = "gaokao_survey_data";
function saveForm(){var d=collectData();localStorage.setItem(STORAGE_KEY,JSON.stringify(d));updateProgress();}
function collectData(){
  function gv(n){var e=document.querySelector('input[name="'+n+'"]:checked');return e?e.value:"";}
  function gcg(i){var c=document.getElementById(i);return c?Array.from(c.querySelectorAll("input:checked")).map(function(x){return x.value}):[];}
  return{
    name:document.getElementById("name").value.trim(),gender:gv("gender"),category:gv("category"),
    phone:document.getElementById("phone").value.trim(),wechat:document.getElementById("wechat").value.trim(),
    hukou:gv("hukou"),totalScore:document.getElementById("totalScore").value,rank:document.getElementById("rank").value,
    subjects:gcg("subjectGroup"),scoreChinese:document.getElementById("scoreChinese").value,
    scoreMath:document.getElementById("scoreMath").value,scoreEnglish:document.getElementById("scoreEnglish").value,
    scoreSub1:document.getElementById("scoreSub1").value,scoreSub2:document.getElementById("scoreSub2").value,
    scoreSub3:document.getElementById("scoreSub3").value,majors:gcg("majorGroup"),
    schoolLevel:gv("schoolLevel"),region:gv("region"),prefCities:document.getElementById("prefCities").value.trim(),
    tuition:gv("tuition"),freeEdu:gv("freeEdu"),income:gv("income"),
    guanxi:gcg("guanxiGroup"),familyEdu:gv("familyEdu"),gradSchool:gv("gradSchool"),
    health:gcg("healthGroup"),personality:gv("personality"),
    parentExpect:document.getElementById("parentExpect").value.trim(),notes:document.getElementById("notes").value.trim(),
    timestamp:new Date().toISOString()
  };
}
function exportData(){
  var d=collectData();
  function l(k,v){return v?k+": "+v:null;}
  function l2(k,v){return v&&v.length?k+": "+v.join("、"):null;}
  var t=[
    "═══════════════════════════════════","  山东高考志愿填报 · 数据采集表","═══════════════════════════════════","",
    "【基本信息】",l("姓名",d.name),l("性别",d.gender),l("类别",d.category),l("电话",d.phone),l("微信",d.wechat),l("户口",d.hukou),"",
    "【高考成绩】",l("总分",d.totalScore),l("位次",d.rank),l2("选科",d.subjects),l("语文",d.scoreChinese),l("数学",d.scoreMath),l("英语",d.scoreEnglish),l("选科1",d.scoreSub1),l("选科2",d.scoreSub2),l("选科3",d.scoreSub3),"",
    "【意向】",l2("专业方向",d.majors),l("院校层次",d.schoolLevel),l("地域",d.region),l("城市",d.prefCities),l("学费",d.tuition),l("公费/定向",d.freeEdu),"",
    "【家庭背景】",l("年收入",d.income),l2("人脉",d.guanxi),l("家族教育",d.familyEdu),l("考研",d.gradSchool),"",
    "【其他】",l2("身体限制",d.health),l("性格",d.personality),l("家长期望",d.parentExpect),l("备注",d.notes),"",
    "填写时间:"+new Date(d.timestamp).toLocaleString("zh-CN"),"───────────────────────────────────","发给你高报师即可🎯"
  ];
  document.getElementById("resultData").textContent=t.filter(Boolean).join("\n");
  document.getElementById("resultPanel").classList.add("show");
  document.getElementById("copyOk").classList.remove("show");
  document.getElementById("resultPanel").scrollIntoView({behavior:"smooth"});
}
function previewData(){exportData();}
async function copyToClipboard(){
  var t=document.getElementById("resultData").textContent;
  if(!t){showToast("请先导出数据");return;}
  try{await navigator.clipboard.writeText(t);}catch(e){var ta=document.createElement("textarea");ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);}
  document.getElementById("copyOk").classList.add("show");showToast("复制成功！");
}
function resetForm(){if(!confirm("确定重置所有数据吗？"))return;localStorage.removeItem(STORAGE_KEY);location.reload();}
function updateProgress(){
  var d=collectData();var f=0;
  if(d.name)f++;if(d.gender)f++;if(d.category)f++;if(d.hukou)f++;
  if(d.totalScore)f++;if(d.rank)f++;if(d.subjects&&d.subjects.length>=3)f++;
  if(d.majors&&d.majors.length>0)f++;if(d.gradSchool)f++;
  ["phone","wechat","income","guanxi","tuition","schoolLevel","region","freeEdu","prefCities","parentExpect","notes","health","personality","familyEdu","scoreChinese","scoreMath","scoreEnglish"].forEach(function(x){var v=d[x];if(v&&(typeof v==="string"?v.trim():v.length>0))f++;});
  document.getElementById("progressText").textContent="已填 "+f+" / 19 项";
}
function showToast(m){var t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(function(){t.classList.remove("show")},2000);}
document.getElementById("subjectGroup").addEventListener("change",function(e){
  var c=this.querySelectorAll("input:checked");
  if(c.length>3){e.target.checked=false;showToast("山东高考只能选3科");}
  document.getElementById("subjectCount").textContent=this.querySelectorAll("input:checked").length;saveForm();
});
document.addEventListener("DOMContentLoaded",function(){
  try{var r=localStorage.getItem(STORAGE_KEY);if(r){var d=JSON.parse(r);
    ["name","phone","wechat","totalScore","rank","scoreChinese","scoreMath","scoreEnglish","scoreSub1","scoreSub2","scoreSub3","prefCities","parentExpect","notes"].forEach(function(i){var e=document.getElementById(i);if(e&&d[i])e.value=d[i];});
    ["gender","category","hukou","schoolLevel","region","tuition","freeEdu","income","familyEdu","gradSchool","personality"].forEach(function(n){var e=document.querySelector('input[name="'+n+'"][value="'+d[n]+'"]');if(e)e.checked=true;});
    ["subjectGroup","majorGroup","guanxiGroup","healthGroup"].forEach(function(g){if(!d[g])return;var c=document.getElementById(g);if(!c)return;c.querySelectorAll("input[type=checkbox]").forEach(function(x){x.checked=(d[g]||[]).includes(x.value);});});
  }}catch(e){}
  updateProgress();
});
</script>
</body>
</html>
